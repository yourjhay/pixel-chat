name: ${APP_NAME}
services:
    application:
        image:  ${APP_NAME}/php:latest
        build: 
            context: ./docker/php/php83-alpine
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
                PHP_OPCACHE_ENABLE: '${PHP_OPCACHE_ENABLE}'
        ports:
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/app'
            - ./docker/php/php83-alpine/php.ini:/usr/local/etc/php/php.ini
        depends_on:
            - mysql
            - redis
    mysql:
        image: 'mysql/mysql-server:8.0'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
        volumes:
            - 'boat-mysql:/var/lib/mysql'
            - ./docker/mysql:/docker-entrypoint-initdb.d
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s
    soketi:
        image: 'quay.io/soketi/soketi:latest-16-alpine'
        environment:
            SOKETI_DEBUG: '${SOKETI_DEBUG:-1}'
            SOKETI_METRICS_SERVER_PORT: '9601'
            SOKETI_DEFAULT_APP_ID: '${PUSHER_APP_ID}'
            SOKETI_DEFAULT_APP_KEY: '${PUSHER_APP_KEY}'
            SOKETI_DEFAULT_APP_SECRET: '${PUSHER_APP_SECRET}'
        ports:
            - '${PUSHER_PORT:-6001}:6001'
            - '${PUSHER_METRICS_PORT:-9601}:9601'
        profiles: [websocket]
    redis:
        image: 'redis:alpine'
        volumes:
            - 'boat-redis:/data'
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    caddy:
        image: caddy  # Use the official Caddy image
        restart: unless-stopped  # Restart container on failure
        volumes:
            - caddy_data:/data  # Persistent storage for Caddy configuration
            - caddy_config:/config  # Mount your Caddyfile
            - caddy_certs:/root/.caddy  # Persistent storage for TLS certificates (optional)
            - ./docker/Caddyfile:/etc/caddy/Caddyfile  # Mount your Caddyfile
            - '.:/app' # Mount your Laravel application code (replace ../app with your path)
        ports:
        - '${APP_PORT:-80}:80' # Map container port 80 to host port 80 (HTTP)
        - '${APP_PORT_SECURE:-443}:443'
        depends_on:
            - application
    queue:
        container_name: ${APP_NAME}-queue
        image: ${APP_NAME}/php:latest
        restart: unless-stopped
        working_dir: /app
        command: php artisan queue:work --sleep=1 --tries=3 --queue=high,default,low
        volumes:
            - .:/app
        networks:
            default: null
        depends_on:
            - application
        
networks:
    default:
        name: ${APP_NAME}-network
        driver: bridge
volumes:
    boat-mysql:
        name: ${APP_NAME}-mysql
        driver: local
    boat-redis:
        driver: local
    caddy_data:
        driver: local
    caddy_config:
        driver: local
    caddy_certs:
        driver: local